                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function TrackingView({ patients, followups, newFollowup, setNewFollowup, handleAddFollowup, currentUser }) {
            
            useEffect(() => {
                if (newFollowup.patientId && newFollowup.patientId !== "custom") {
                    const matchPat = patients.find(p => p.id === newFollowup.patientId);
                    if (matchPat) {
                        const calculatedDate = calculateTargetDate(matchPat.registerDate, newFollowup.round);
                        setNewFollowup(prev => ({
                            ...prev,
                            group: matchPat.group,
                            checkDate: calculatedDate
                        }));
                    }
                } else if (newFollowup.patientId === "custom") {
                    const calculatedDate = calculateTargetDate("2026-06-24", newFollowup.round);
                    setNewFollowup(prev => ({
                        ...prev,
                        checkDate: calculatedDate
                    }));
                }
            }, [newFollowup.patientId, newFollowup.round, patients]);

            return (
                <div className="max-w-xl mx-auto bg-white rounded-[32px] shadow-xl border border-slate-100 p-6 md:p-8 space-y-5 animate-fadeIn">
                    <div className="border-b border-slate-100 pb-4 text-center">
                        <div className="inline-flex p-3 rounded-2xl bg-brand-50 text-brand-600 mb-2">
                            <i className="fa-solid fa-clipboard-check text-xl"></i>
                        </div>
                        <h3 className="font-extrabold text-slate-800 text-sm md:text-base">เพิ่มบันทึกความก้าวหน้าติดตาม 7 รอบ</h3>
                        <p className="text-[10px] text-slate-400 mt-1">ระบบจะคำนวณวันกำหนดนัดรอบถัดไปอัตโนมัติจากวันที่คนไข้เริ่มขึ้นทะเบียน</p>
                    </div>

                    <form onSubmit={handleAddFollowup} className="space-y-4 text-xs">
                        <div>
                            <label className="block text-xxs font-extrabold text-slate-700 mb-1.5">ค้นหาและเลือกรายชื่อผู้บำบัด *</label>
                            <select 
                                value={newFollowup.patientId}
                                onChange={(e) => {
                                    const val = e.target.value;
                                    const selectedPat = patients.find(p => p.id === val);
                                    setNewFollowup({
                                        ...newFollowup,
                                        patientId: val,
                                        group: selectedPat ? selectedPat.group : (currentUser.hospital === "ทั้งหมด" ? HOSPITALS[0] : currentUser.hospital)
                                    });
                                }}
                                className="w-full px-3.5 py-3 border border-slate-300 rounded-xl text-xs focus:ring-2 focus:ring-brand-500 font-bold bg-slate-50/50 outline-none"
                                required
                            >
                                <option value="" disabled>-- กรุณาเลือกคนไข้ในทะเบียน --</option>
                                <option value="custom">-- บันทึกรายการกรณีฉุกเฉินภายนอกทะเบียน --</option>
                                {patients.map(p => (
                                    <option key={p.id} value={p.id}>
                                        {p.name} [{p.group.replace("โรงพยาบาลส่งเสริมสุขภาพตำบล", "รพ.สต.")}] (เริ่มบำบัด: {formatThaiDate(p.registerDate)})
                                    </option>
                                ))}
                            </select>
                        </div>

                        {newFollowup.patientId === "custom" && (
                            <div className="p-4 bg-brand-50/50 rounded-2xl border border-brand-100 space-y-3">
                                <div>
                                    <label className="block text-xxs font-extrabold text-slate-700 mb-1">ระบุชื่อ นามสกุลคนไข้ด่วน *</label>
                                    <input 
                                        type="text" 
                                        id="customNameInput"
                                        placeholder="พิมพ์ชื่อจริง นามสกุลจริง"
                                        className="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-xs"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-xxs font-extrabold text-slate-700 mb-1">สังกัดกลุ่มบำบัด *</label>
                                    {currentUser.hospital === "ทั้งหมด" ? (
                                        <select 
                                            value={newFollowup.group}
                                            onChange={(e) => setNewFollowup({...newFollowup, group: e.target.value})}
                                            className="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-xs"
                                        >
                                            {HOSPITALS.map((h, i) => <option key={i} value={h}>{h}</option>)}
                                        </select>
                                    ) : (
                                        <input 
                                            type="text" 
                                            value={currentUser.hospital} 
                                            disabled 
                                            className="w-full px-3 py-2 border border-slate-200 bg-slate-100 rounded-lg text-xs font-bold text-slate-500" 
                                        />
                                    )}
                                </div>
                            </div>
                        )}

                        <div>
                            <label className="block text-xxs font-extrabold text-slate-700 mb-1.5">เลือกรอบการบำบัดตรวจติดตาม (7 รอบ) *</label>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-1.5 font-sans">
                                {TRACKING_ROUNDS.map((roundObj) => (
                                    <button
                                        type="button"
                                        key={roundObj.id}
                                        onClick={() => setNewFollowup({ ...newFollowup, round: roundObj.name })}
                                        className={`py-2 px-1 text-center rounded-xl border text-[10px] font-extrabold transition-all ${
                                            newFollowup.round === roundObj.name 
                                                ? 'bg-brand-600 text-white border-brand-600 shadow' 
                                                : 'bg-white text-slate-600 hover:bg-slate-50 border-slate-200'
                                        }`}
                                    >
                                        {roundObj.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div>
                            <label className="block text-xxs font-extrabold text-slate-700 mb-1">วันที่กำหนดนัดหมายของรอบปัจจุบัน (พ.ศ.) *</label>
                            <div className="relative">
                                <input 
                                    type="date" 
                                    value={newFollowup.checkDate}
                                    onChange={(e) => setNewFollowup({...newFollowup, checkDate: e.target.value})}
                                    className="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs font-bold"
                                    required
                                />
                                <span className="absolute right-2 top-1.5 text-[9px] text-brand-800 bg-brand-50 border border-brand-200 px-2 py-1 rounded font-extrabold">
                                    พ.ศ. นัดหมาย: {formatThaiDate(newFollowup.checkDate)}
                                </span>
                            </div>
                        </div>

                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                            <label className="block text-xxs font-extrabold text-slate-700 mb-2 uppercase text-center">บันทึกการแสดงตัวมานัด</label>
                            <div className="grid grid-cols-2 gap-2">
                                <button 
                                    type="button"
                                    onClick={() => setNewFollowup({ ...newFollowup, attended: true })}
                                    className={`flex items-center justify-center py-2.5 px-3 rounded-xl border-2 transition font-extrabold ${newFollowup.attended ? 'border-blue-500 bg-blue-50/50 text-blue-800' : 'border-slate-200 bg-white text-slate-400'}`}
                                >
                                    <i className="fa-solid fa-square-check text-sm mr-1.5"></i>
                                    <span>มาตามนัดหมาย</span>
                                </button>

                                <button 
                                    type="button"
                                    onClick={() => setNewFollowup({ ...newFollowup, attended: false })}
                                    className={`flex items-center justify-center py-2.5 px-3 rounded-xl border-2 transition font-extrabold ${!newFollowup.attended ? 'border-amber-500 bg-amber-50/50 text-amber-800' : 'border-slate-200 bg-white text-slate-400'}`}
                                >
                                    <i className="fa-solid fa-square-minus text-sm mr-1.5"></i>
                                    <span>ไม่มาตามนัดหมาย</span>
                                </button>
                            </div>
                        </div>

                        {newFollowup.attended ? (
                            <div className="bg-rose-50/50 p-4 rounded-2xl border border-rose-100 space-y-2 animate-fadeIn">
                                <label className="block text-xxs font-extrabold text-rose-800 flex items-center mb-1">
                                    <i className="fa-solid fa-vial-virus text-sm mr-1.5"></i>
                                    <span>ผลตรวจวิเคราะห์สารเสพติดในปัสสาวะ *</span>
                                </label>
                                <div className="grid grid-cols-2 gap-2">
                                    <button 
                                        type="button"
                                        onClick={() => setNewFollowup({ ...newFollowup, drugDetected: true })}
                                        className={`flex items-center justify-center py-2.5 px-3 rounded-xl border-2 transition font-extrabold ${newFollowup.drugDetected ? 'border-red-500 bg-red-100/60 text-red-800' : 'border-slate-200 bg-white text-slate-400'}`}
                                    >
                                        <i className="fa-solid fa-circle-exclamation mr-1.5"></i>
                                        <span>พบสารเสพติด</span>
                                    </button>

                                    <button 
                                        type="button"
                                        onClick={() => setNewFollowup({ ...newFollowup, drugDetected: false })}
                                        className={`flex items-center justify-center py-2.5 px-3 rounded-xl border-2 transition font-extrabold ${!newFollowup.drugDetected ? 'border-emerald-500 bg-emerald-100/60 text-emerald-800' : 'border-slate-200 bg-white text-slate-400'}`}
                                    >
                                        <i className="fa-solid fa-check-double mr-1.5"></i>
                                        <span>ไม่พบสารเสพติด</span>
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-amber-50/40 p-3 text-center text-[10px] text-amber-800 font-bold rounded-xl animate-pulse">
                                <i className="fa-solid fa-ban mr-1.5"></i>
                                ระบบยกเว้นการตรวจหาสารเสพติดให้อัตโนมัติ เนื่องจากคนไข้ "ไม่มาตามนัดหมาย"
                            </div>
                        )}

                        <div>
                            <label className="block text-xxs font-extrabold text-slate-700 mb-1">บันทึกเพิ่มเติมจากเจ้าหน้าที่</label>
                            <textarea 
                                placeholder="พฤติกรรม อาชีพ สภาพแวดล้อม หรือข้อมูลสำคัญทางสังคมเพิ่มเติม..." 
                                value={newFollowup.note}
                                onChange={(e) => setNewFollowup({...newFollowup, note: e.target.value})}
                                rows="3"
                                className="w-full px-3 py-2 border border-slate-300 rounded-xl outline-none focus:ring-1 focus:ring-brand-500"
                            ></textarea>
                        </div>

                        <button type="submit" className="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-extrabold rounded-xl shadow-md transition-all flex items-center justify-center space-x-1.5">
                            <i className="fa-solid fa-floppy-disk text-sm"></i>
                            <span>บันทึกความก้าวหน้าลง Canva Sheet</span>
                        </button>
                    </form>
                </div>
            );
        }

        function CanvaSheetView({ followups, handleUpdateFollowup, triggerDeleteRequest, exportToExcel, currentUser }) {
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedGroupFilter, setSelectedGroupFilter] = useState("ทั้งหมด");
            const [selectedRoundFilter, setSelectedRoundFilter] = useState("ทั้งหมด");

            const filteredFollowups = followups.filter(f => {
                const matchSearch = f.patientName.toLowerCase().includes(searchTerm.toLowerCase()) || (f.note && f.note.toLowerCase().includes(searchTerm.toLowerCase()));
                const matchGroup = selectedGroupFilter === "ทั้งหมด" || f.group === selectedGroupFilter;
                const matchRound = selectedRoundFilter === "ทั้งหมด" || f.round === selectedRoundFilter;
                return matchSearch && matchGroup && matchRound;
            });

            return (
                <div className="bg-white rounded-3xl shadow border border-slate-100 overflow-hidden flex flex-col animate-fadeIn">
                    
                    <div className="bg-slate-900 text-white p-5 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div className="space-y-1">
                            <div className="flex items-center space-x-2">
                                <span className="bg-emerald-500 text-slate-950 font-black text-[9px] px-2 py-0.5 rounded uppercase animate-pulse">Auto-Saved to Cloud</span>
                                <h3 className="font-extrabold text-xs md:text-sm flex items-center space-x-2">
                                    <i className="fa-solid fa-table-list text-emerald-400"></i>
                                    <span>กระดานแก้ไขสเปรดชีตออนไลน์ (Canva Sheet)</span>
                                </h3>
                            </div>
                            <p className="text-[10px] text-slate-400">แก้ไขข้อมูลคนไข้ วันนัด รอบ บันทึกเพิ่มเติม หรือผลตรวจในคอลัมน์ได้โดยตรงทันทีเพื่อการทำงานบูรณาการอย่างสะดวก</p>
                        </div>
                        <div className="flex items-center space-x-2">
                            <button onClick={exportToExcel} className="bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] font-extrabold px-3.5 py-2 rounded-xl transition flex items-center space-x-1.5 shadow-md">
                                <i className="fa-solid fa-file-excel"></i>
                                <span>ดาวน์โหลดตารางเป็น Excel</span>
                            </button>
                        </div>
                    </div>

                    {/* Filter controls */}
                    <div className="p-4 bg-slate-50 border-b border-slate-200 grid grid-cols-1 md:grid-cols-4 gap-3">
                        <div>
                            <label className="block text-xxs font-extrabold text-slate-500 mb-1">ค้นหาคนไข้/บันทึก</label>
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                    <i className="fa-solid fa-magnifying-glass text-xs"></i>
                                </span>
                                <input 
                                    type="text" 
                                    placeholder="พิมพ์ค้นหาด่วน..." 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full pl-8 pr-4 py-1.5 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:ring-1 focus:ring-brand-500 font-semibold"
                                />
                            </div>
                        </div>

                        <div>
                            <label className="block text-xxs font-extrabold text-slate-500 mb-1">กรองตำบล/โรงพยาบาล</label>
                            {currentUser.hospital === "ทั้งหมด" ? (
                                <select 
                                    value={selectedGroupFilter}
                                    onChange={(e) => setSelectedGroupFilter(e.target.value)}
                                    className="w-full px-3 py-1.5 bg-white border border-slate-300 rounded-lg text-xs outline-none font-bold text-slate-700"
                                >
                                    <option value="ทั้งหมด">-- แสดงทั้งหมด --</option>
                                    {HOSPITALS.map((h, i) => <option key={i} value={h}>{h.replace("โรงพยาบาลส่งเสริมสุขภาพตำบล", "รพ.สต.")}</option>)}
                                </select>
                            ) : (
                                <input 
                                    type="text" 
                                    value={currentUser.hospital} 
                                    disabled 
                                    className="w-full px-3 py-1.5 bg-slate-100 border border-slate-200 rounded-lg text-xs font-bold text-slate-500" 
                                />
                            )}
                        </div>

                        <div>
                            <label className="block text-xxs font-extrabold text-slate-500 mb-1">กรองรอบนัดติดตาม</label>
                            <select 
                                value={selectedRoundFilter}
                                onChange={(e) => setSelectedRoundFilter(e.target.value)}
                                className="w-full px-3 py-1.5 bg-white border border-slate-300 rounded-lg text-xs outline-none font-bold text-slate-700 font-sans"
                            >
                                <option value="ทั้งหมด">-- แสดงทุกรอบการบำบัด --</option>
                                {TRACKING_ROUNDS.map((r, i) => <option key={i} value={r.name}>{r.name}</option>)}
                            </select>
                        </div>

                        <div className="flex items-end justify-end text-xxs text-slate-500 pb-1 font-semibold">
                            <span className="font-extrabold text-slate-700">ผลกรองชุดนัดหมาย:</span>&nbsp;
                            <span>{filteredFollowups.length} จาก {followups.length} รายการ</span>
                        </div>
                    </div>

                    {/* Main Interactive Spreadsheet */}
                    <div className="overflow-x-auto canva-sheet-scroll">
                        <table className="w-full text-left border-collapse table-fixed min-w-[1100px]">
                            <thead className="bg-slate-100 text-slate-600 font-extrabold text-xxs uppercase border-b border-slate-200">
                                <tr>
                                    <th className="p-3 w-16 text-center border-r border-slate-200">ID</th>
                                    <th className="p-3 w-44 border-r border-slate-200">ชื่อ - นามสกุลจริงผู้รับการบำบัด</th>
                                    <th className="p-3 w-52 border-r border-slate-200">หน่วยบริการสาธารณสุขผู้รับผิดชอบ</th>
                                    <th className="p-3 w-28 border-r border-slate-200 text-center">รอบนัดหมาย</th>
                                    <th className="p-3 w-36 border-r border-slate-200">วันที่นัดหมาย (พ.ศ.)</th>
                                    <th className="p-3 w-36 border-r border-slate-200 text-center">มาตามนัด?</th>
                                    <th className="p-3 w-36 border-r border-slate-200 text-center">ผลตรวจปัสสาวะ</th>
                                    <th className="p-3 w-56 border-r border-slate-200">บันทึกเพิ่มเติมจากทีมรักษา</th>
                                    <th className="p-3 w-16 text-center">ลบ</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-150 text-xs text-slate-700">
                                {filteredFollowups.length === 0 ? (
                                    <tr>
                                        <td colSpan="9" className="p-8 text-center text-slate-400 font-bold bg-white">ไม่พบบันทึกตรงตามเงื่อนไขที่กรองข้อมูล</td>
                                    </tr>
                                ) : (
                                    filteredFollowups.map((f) => {
                                        const hasEditPermission = currentUser.role === 'superadmin' || f.group === currentUser.hospital;

                                        return (
                                            <tr key={f.id} className="hover:bg-slate-50 even:bg-slate-50/25 transition-all">
                                                <td className="p-2.5 text-center font-bold text-slate-400 bg-slate-50 border-r border-slate-100">{f.id}</td>
                                                
                                                {/* Patient Name */}
                                                <td className="p-2 border-r border-slate-100">
                                                    <input 
                                                        type="text" 
                                                        value={f.patientName} 
                                                        disabled={!hasEditPermission}
                                                        onChange={(e) => handleUpdateFollowup(f.id, 'patientName', e.target.value)}
                                                        className="w-full bg-transparent hover:bg-slate-100 focus:bg-white px-2 py-1 rounded-lg border border-transparent focus:border-slate-300 font-bold outline-none transition disabled:bg-transparent disabled:text-slate-700"
                                                    />
                                                </td>

                                                {/* Hospital Group selector */}
                                                <td className="p-2 border-r border-slate-100">
                                                    <select 
                                                        value={f.group} 
                                                        disabled={!hasEditPermission || currentUser.role !== 'superadmin'}
                                                        onChange={(e) => handleUpdateFollowup(f.id, 'group', e.target.value)}
                                                        className="w-full bg-transparent hover:bg-slate-100 focus:bg-white px-1.5 py-1 rounded-lg border border-transparent focus:border-slate-300 outline-none transition font-semibold text-slate-800 text-xxs"
                                                    >
                                                        {HOSPITALS.map((h, idx) => (
                                                            <option key={idx} value={h}>{h.replace("โรงพยาบาลส่งเสริมสุขภาพตำบล", "รพ.สต.")}</option>
                                                        ))}
                                                    </select>
                                                </td>

                                                {/* Round */}
                                                <td className="p-2 border-r border-slate-100 text-center font-sans">
                                                    <select 
                                                        value={f.round || "2 สัปดาห์"} 
                                                        disabled={!hasEditPermission}
                                                        onChange={(e) => handleUpdateFollowup(f.id, 'round', e.target.value)}
                                                        className="w-full bg-transparent hover:bg-slate-100 focus:bg-white px-1.5 py-1 rounded-lg border border-transparent focus:border-slate-300 outline-none transition font-extrabold text-blue-800 text-center text-xxs"
                                                    >
                                                        {TRACKING_ROUNDS.map((tr, idx) => (
                                                            <option key={idx} value={tr.name}>{tr.name}</option>
                                                        ))}
                                                    </select>
                                                </td>

                                                {/* Date with automatic BE text sync */}
                                                <td className="p-2 border-r border-slate-100">
                                                    <div className="flex flex-col">
                                                        <input 
                                                            type="date" 
                                                            value={f.checkDate} 
                                                            disabled={!hasEditPermission}
                                                            onChange={(e) => handleUpdateFollowup(f.id, 'checkDate', e.target.value)}
                                                            className="w-full bg-transparent hover:bg-slate-100 focus:bg-white px-1.5 py-0.5 rounded border border-transparent focus:border-slate-200 outline-none font-bold text-slate-900"
                                                        />
                                                        <span className="text-[9px] text-slate-400 font-bold px-1.5 block">
                                                            {formatThaiDate(f.checkDate)}
                                                        </span>
                                                    </div>
                                                </td>

                                                {/* Attendance buttons */}
                                                <td className="p-2 text-center border-r border-slate-100">
                                                    <div className="flex justify-center space-x-1">
                                                        <button 
                                                            type="button"
                                                            disabled={!hasEditPermission}
                                                            onClick={() => handleUpdateFollowup(f.id, 'attended', true)}
                                                            className={`px-2 py-1 rounded-lg text-[9px] font-extrabold transition-all ${f.attended ? 'bg-blue-100 text-blue-800 border border-blue-200' : 'bg-slate-100 text-slate-400'}`}
                                                        >
                                                            มาตรงนัด
                                                        </button>
                                                        <button 
                                                            type="button"
                                                            disabled={!hasEditPermission}
                                                            onClick={() => handleUpdateFollowup(f.id, 'attended', false)}
                                                            className={`px-2 py-1 rounded-lg text-[9px] font-extrabold transition-all ${!f.attended ? 'bg-amber-100 text-amber-800 border border-amber-200' : 'bg-slate-100 text-slate-400'}`}
                                                        >
                                                            ขาดนัด
                                                        </button>
                                                    </div>
                                                </td>

                                                {/* Urine test buttons */}
                                                <td className="p-2 text-center border-r border-slate-100">
                                                    {f.attended ? (
                                                        <div className="flex justify-center space-x-1">
                                                            <button 
                                                                type="button"
                                                                disabled={!hasEditPermission}
                                                                onClick={() => handleUpdateFollowup(f.id, 'drugDetected', true)}
                                                                className={`px-2 py-1 rounded-lg text-[9px] font-extrabold transition-all ${f.drugDetected ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-slate-100 text-slate-400'}`}
                                                            >
                                                                พบสาร
                                                            </button>
                                                            <button 
                                                                type="button"
                                                                disabled={!hasEditPermission}
                                                                onClick={() => handleUpdateFollowup(f.id, 'drugDetected', false)}
                                                                className={`px-2 py-1 rounded-lg text-[9px] font-extrabold transition-all ${f.drugDetected === false ? 'bg-emerald-100 text-emerald-800 border border-emerald-200' : 'bg-slate-100 text-slate-400'}`}
                                                            >
                                                                ไม่พบ
                                                            </button>
                                                        </div>
                                                    ) : (
                                                        <span className="text-[10px] text-slate-400 italic font-bold">ยกเว้นตรวจ</span>
                                                    )}
                                                </td>

                                                {/* Notes */}
                                                <td className="p-2 border-r border-slate-100">
                                                    <input 
                                                        type="text" 
                                                        value={f.note || ""} 
                                                        disabled={!hasEditPermission}
                                                        placeholder="พิมพ์ข้อความบันทึก..."
                                                        onChange={(e) => handleUpdateFollowup(f.id, 'note', e.target.value)}
                                                        className="w-full bg-transparent hover:bg-slate-100 focus:bg-white px-2 py-1 rounded border border-transparent focus:border-slate-300 text-slate-600 outline-none text-xxs transition font-semibold"
                                                    />
                                                </td>

                                                {/* Delete button (Superadmin & Authorized Staff only) */}
                                                <td className="p-2 text-center">
                                                    {hasEditPermission ? (
                                                        <button 
                                                            onClick={() => triggerDeleteRequest(f.id, 'followup')} 
                                                            className="text-rose-500 hover:text-rose-700 p-1.5 bg-rose-50 hover:bg-rose-100 rounded-lg transition"
                                                        >
                                                            <i className="fa-solid fa-trash-can text-xs"></i>
                                                        </button>
                                                    ) : (
                                                        <span className="text-[10px] text-slate-300 italic"><i className="fa-solid fa-lock text-[8px]"></i> ล็อก</span>
                                                    )}
                                                </td>
                                            </tr>
                                        );
                                    })
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function UsersManagementView({ users, newUser, setNewUser, handleAddUser, handleDeleteUser }) {
            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fadeIn">
                    <div className="bg-white rounded-3xl shadow border border-slate-100 p-6 space-y-4 lg:col-span-1 h-fit">
                        <div className="border-b border-slate-100 pb-3">
                            <h3 className="font-extrabold text-slate-800 text-xs md:text-sm flex items-center space-x-1.5">
                                <i className="fa-solid fa-user-gear text-indigo-600"></i>
                                <span>เพิ่มเจ้าหน้าที่สิทธิ์ร่วม</span>
                            </h3>
                            <p className="text-[10px] text-slate-400 mt-0.5">ผูกบัญชีสังกัดเพื่อจำกัดการแก้ไขข้อมูลตามรพ.สต. เพื่อความปลอดภัยของข้อมูล</p>
                        </div>

                        <form onSubmit={handleAddUser} className="space-y-4 text-xs">
                            <div>
                                <label className="block text-xxs font-extrabold text-slate-700 mb-1">ชื่อบัญชีผู้ใช้งาน (Username) *</label>
                                <input 
                                    type="text" 
                                    placeholder="เช่น khoksaat_staff" 
                                    value={newUser.username}
                                    onChange={(e) => setNewUser({...newUser, username: e.target.value})}
                                    className="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition font-semibold"
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-xxs font-extrabold text-slate-700 mb-1">รหัสรักษาความปลอดภัย (Password) *</label>
                                <input 
                                    type="password" 
                                    placeholder="ระบุรหัสรักษาความปลอดภัย" 
                                    value={newUser.password}
                                    onChange={(e) => setNewUser({...newUser, password: e.target.value})}
                                    className="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition"
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-xxs font-extrabold text-slate-700 mb-1">ชื่อ-นามสกุลจริงผู้ใช้งาน *</label>
                                <input 
                                    type="text" 
                                    placeholder="เช่น นายประวิทย์ อักษรทอง" 
                                    value={newUser.name}
                                    onChange={(e) => setNewUser({...newUser, name: e.target.value})}
                                    className="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition font-semibold"
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-xxs font-extrabold text-slate-700 mb-1">บทบาทและระดับสิทธิ์การรักษาข้อมูล *</label>
                                <select 
                                    value={newUser.role}
                                    onChange={(e) => setNewUser({...newUser, role: e.target.value})}
                                    className="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-700"
                                >
                                    <option value="staff">ผู้ใช้ทั่วไปประจำสังกัด (คีย์ข้อมูลและดูประวัติคนไข้ของหน่วยงานตนเองเท่านั้น)</option>
                                    <option value="superadmin">ผู้ดูแลระบบสูงสุด (Super Admin - จัดการและลบข้อมูลได้ทั้งหมด)</option>
                                </select>
                            </div>

                            {newUser.role === 'staff' && (
                                <div>
                                    <label className="block text-xxs font-extrabold text-slate-700 mb-1">โรงพยาบาล/รพ.สต. ที่ผูกสิทธิ์รับผิดชอบ *</label>
                                    <select 
                                        value={newUser.hospital}
                                        onChange={(e) => setNewUser({...newUser, hospital: e.target.value})}
                                        className="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-700"
                                    >
                                        {HOSPITALS.map((h, i) => <option key={i} value={h}>{h}</option>)}
                                    </select>
                                </div>
                            )}

                            <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold rounded-xl transition shadow flex items-center justify-center space-x-1">
                                <i className="fa-solid fa-user-shield"></i>
                                <span>สร้างบัญชีผู้ใช้งานนี้</span>
                            </button>
                        </form>
                    </div>

                    <div className="bg-white rounded-3xl shadow border border-slate-100 p-6 space-y-4 lg:col-span-2">
                        <div>
                            <h3 className="font-extrabold text-slate-800 text-xs md:text-sm">รายชื่อแอดมินและบัญชีผู้ใช้ออนไลน์ในระบบ ({users.length} ราย)</h3>
                            <p className="text-[10px] text-slate-400">บัญชีที่จัดเก็บร่วมบนคลาวด์ สามารถล็อคอินเข้าประเมินผลได้จริง</p>
                        </div>

                        <div className="overflow-x-auto border border-slate-100 rounded-2xl">
                            <table className="w-full text-left border-collapse text-xxs md:text-xs">
                                <thead className="bg-slate-50 text-slate-500 font-extrabold border-b border-slate-100">
                                    <tr>
                                        <th className="p-3">ID</th>
                                        <th className="p-3">บัญชีผู้ใช้</th>
                                        <th className="p-3">รหัสความปลอดภัย</th>
                                        <th className="p-3">ชื่อ - นามสกุลเต็ม</th>
                                        <th className="p-3">บทบาทสิทธิ์</th>
                                        <th className="p-3">หน่วยงานสถานพยาบาลที่ดูแล</th>
                                        <th className="p-3 text-center">ลบ</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-slate-700 font-medium">
                                    {users.map((u) => (
                                        <tr key={u.id} className="hover:bg-slate-50">
                                            <td className="p-3 font-semibold text-slate-400">{u.id}</td>
                                            <td className="p-3 font-bold text-indigo-700">{u.username}</td>
                                            <td className="p-3 text-slate-400 font-mono">{u.password}</td>
                                            <td className="p-3 text-slate-800 font-semibold">{u.name}</td>
                                            <td className="p-3">
                                                <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold ${u.role === 'superadmin' ? 'bg-indigo-100 text-indigo-800' : 'bg-slate-100 text-slate-800'}`}>
                                                    {u.role === 'superadmin' ? 'Super Admin' : 'Staff'}
                                                </span>
                                            </td>
                                            <td className="p-3 text-slate-600 font-bold text-xxs">{u.hospital}</td>
                                            <td className="p-3 text-center">
                                                {u.username === 'admin' ? (
                                                    <span className="text-slate-400 text-xxs italic">แอดมินหลัก (ลบไม่ได้)</span>
                                                ) : (
                                                    <button 
                                                        onClick={() => handleDeleteUser(u.id)}
                                                        className="text-rose-500 hover:text-rose-700 p-1.5 bg-rose-50 hover:bg-rose-100 rounded-lg transition"
                                                    >
                                                        <i className="fa-solid fa-trash-can"></i>
                                                    </button>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // Mount React Application
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

        // ระบบจะทำงานต่อเนื่องกันได้อย่างสมบูรณ์
    </script>
</body>
</html>
